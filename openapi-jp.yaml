  securitySchemes:
    pendo_integration_key:
      type: apiKey
      in: header
      name: x-pendo-integration-key
      description: |
        Pendo インテグレーションキー。**サブスクリプション設定 → インテグレーション** で確認できます。
        `app.pendo.io` のすべての API エンドポイントで使用します。
    pendo_track_secret:
      type: apiKey
      in: header
      name: x-pendo-integration-key
      description: |
        Pendo トラックイベント共有シークレット。インテグレーションキーとは**異なるキー**です。
        `data.pendo.io` のトラックおよび Conversations エンドポイントのみで使用します。
