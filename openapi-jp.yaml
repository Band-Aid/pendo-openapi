  # ── Aggregation ───────────────────────────────────────────────────────────────

  /aggregation:
    post:
      tags:
        - Aggregation
      operationId: runAggregation
      summary: Aggregation クエリの実行
      description: |
        任意の Pendo データソースに対してパイプラインベースの Aggregation クエリを実行します。
        Pendo UI のすべてのグラフ・レポートはこのエンドポイントで動作しています。

        ## パイプラインステージ
        | ステージ | 説明 |
        |---|---|
        | `source` | データソースと時間ウィンドウを定義 |
        | `filter` | MongoDB スタイルのフィルター条件 |
        | `identified` | 特定フィールドでグループ化 |
        | `reduce` | `sum`・`count`・`max` などで集計 |
        | `select` | 出力フィールドの選択/リネーム |
        | `sort` | 結果の並び替え |
        | `limit` | 返却行数の上限 |
        | `spawn` | 複数サブパイプラインを並行実行してマージ |
        | `join` | 別ソースのフィールドで結果を補完 |
        | `bulkExpand` | メタデータフィールドをインラインで展開 |

        ## データソース
        **メタデータ/オブジェクト:** `visitors`、`accounts`、`pages`、`features`、
        `trackTypes`、`guides`、`groups`、`surveyItems`、`npsPredictions`

        **イベント:** `events`、`pageEvents`、`featureEvents`、`trackEvents`、
        `guideEvents`、`guidesSeen`、`pollEvents`、`pollsSeen`、`surveyResponses`、
        `emailEvents`

        **Listen:** `vocItems`、`votes`

        ## timeSeries パラメーター
        - `first`: 日付文字列または `now()`
        - `count`: 期間の数（負の値 = 過去を参照）
        - `period`: `"hour"`・`"day"`・`"dayRange"`・`"week"`・`"month"`・`"year"`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request
              properties:
                request:
                  type: object
                  required:
                    - pipeline
                  properties:
                    name:
                      type: string
                    requestId:
                      type: string
                    pipeline:
                      type: array
                      items:
                        type: object
                response:
                  type: object
                  properties:
                    mimeType:
                      type: string
                      enum: [application/json, text/csv]
                      default: application/json
            examples:
              pageEventsByVisitor:
                summary: ビジター別ページイベント数（直近 30 日）
                value:
                  request:
                    name: page-events-by-visitor
                    pipeline:
                      - source:
                          pageEvents: null
                          timeSeries:
                            first: "now()"
                            count: -30
                            period: dayRange
                      - identified: visitorId
                      - reduce:
                          - count: 1
                  response:
                    mimeType: application/json
      responses:
        '200':
          description: クエリ結果。
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
        '400':
          description: パイプライン構文が無効か、不明なソースが指定されました。
      security:
        - pendo_integration_key: []

  /data/track:
    post:
      tags:
        - Track
      operationId: sendTrackEvent
      summary: トラックイベントの送信
      description: |
        ビジターのカスタムアクション（トラックイベント）を記録します。

        **ベース URL:** `https://data.pendo.io`（`app.pendo.io` ではありません）。

        **認証:** `x-pendo-integration-key` ヘッダーに **トラックイベント共有シークレット** を指定します。
      servers:
        - url: https://data.pendo.io
          description: Pendo トラック・Conversations インジェストエンドポイント
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackEvent'
            example:
              type: "track"
              event: "登録完了"
              visitorId: "visitor-unique-id"
              accountId: "account-id"
              timestamp: 1680373680000
              properties:
                plan: "Pro"
      responses:
        '200':
          description: イベントが受け付けられました。
        '400':
          description: ペイロードが無効です。
      security:
        - pendo_track_secret: []

  /data/agentic:
    post:
      tags:
        - Conversations
      operationId: sendConversationEvent
      summary: Conversation イベントの送信
      description: |
        AI エージェントのインタラクション（プロンプト・レスポンスなど）を記録します。

        **ベース URL:** `https://data.pendo.io`（`app.pendo.io` ではありません）。

        **認証:** `x-pendo-integration-key` ヘッダーに **トラックイベント共有シークレット** を指定します。
      servers:
        - url: https://data.pendo.io
          description: Pendo トラック・Conversations インジェストエンドポイント
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationEvent'
            example:
              type: "prompt"
              visitor_id: "exampleVisitor"
              account_id: "exampleAccount"
              timestamp: 1769802954000
              props:
                agentId: "0MjY3pcq1FFxH3a5KBGKUoPvEIk"
                conversationId: "conv_1765734044978_6erskba"
                messageId: "message_from_api1"
                content: "ダッシュボードから利用データをエクスポートするにはどうすればいいですか？"
                suggestedPrompt: false
                agentInputTokenCount: 512
                agentOutputTokenCount: 128
      responses:
        '200':
          description: Conversation イベントが受け付けられました。
        '400':
          description: ペイロードが無効です。
      security:
        - pendo_track_secret: []

components:
  parameters:
    segmentId:
      name: segmentId
      in: path
      required: true
      description: セグメントの ID。
      schema:
        type: string

    visitorIdPath:
      name: visitorId
      in: path
      required: true
      description: URLエンコードされたビジター ID。
      schema:
        type: string

    guideId:
      name: guideId
      in: path
      required: true
      description: ガイドの ID。
      schema:
        type: string

    reportId:
      name: reportId
      in: path
      required: true
      description: レポートの ID。
      schema:
        type: string

    metadataKind:
      name: kind
      in: path
      required: true
      description: '`visitor` または `account`'
      schema:
        type: string
        enum: [visitor, account]

    metadataGroup:
      name: group
      in: path
      required: true
      description: '`agent` または `custom`'
      schema:
        type: string
        enum: [agent, custom]

    metadataId:
      name: id
      in: path
      required: true
      description: 更新するビジターまたはアカウントの ID。
      schema:
        type: string

    metadataFieldName:
      name: fieldName
      in: path
      required: true
      description: メタデータフィールドの内部名。
      schema:
        type: string

  schemas:

    Visitor:
      type: object
      description: ビジターオブジェクト。
      properties:
        id:
          type: string
          description: ビジターの一意の ID。
          example: "4203948023423"
        email:
          type: string
          example: "user@example.com"
        accountIds:
          type: array
          items:
            type: string
        metadata:
          type: object
          properties:
            agent:
              type: object
              description: インストールスニペット経由で渡されたメタデータ。
              properties:
                email:
                  type: string
                ipaddress:
                  type: string
                language:
                  type: string
            auto:
              type: object
              description: Pendo が自動生成したメタデータ。
              properties:
                firstvisit:
                  type: integer
                  format: int64
                  example: 1506351511034
                lastbrowsername:
                  type: string
                  example: "Chrome"
                lastupdated:
                  type: integer
                  format: int64
                lastvisit:
                  type: integer
                  format: int64

    Account:
      type: object
      description: アカウントオブジェクト。
      properties:
        id:
          type: string
          example: "acme-corp"
        metadata:
          type: object
          properties:
            agent:
              type: object
            auto:
              type: object
              properties:
                firstvisit:
                  type: integer
                  format: int64
                lastupdated:
                  type: integer
                  format: int64
                lastvisit:
                  type: integer
                  format: int64

    Page:
      type: object
      description: タグ付けされたページ定義。
      properties:
        id:
          type: string
        appId:
          type: string
        name:
          type: string
        rules:
          type: array
          items:
            type: object
        createdAt:
          type: integer
          format: int64
        lastUpdatedAt:
          type: integer
          format: int64

    Feature:
      type: object
      description: タグ付けされたフィーチャー定義。
      properties:
        id:
          type: string
        appId:
          type: string
        name:
          type: string
        elementPathRules:
          type: array
          items:
            type: object
        pageId:
          type: string
        createdAt:
          type: integer
          format: int64
        lastUpdatedAt:
          type: integer
          format: int64

    TrackType:
      type: object
      description: トラックイベントタイプ定義。
      properties:
        id:
          type: string
        appId:
          type: string
        name:
          type: string
        createdAt:
          type: integer
          format: int64
        lastUpdatedAt:
          type: integer
          format: int64

    Guide:
      type: object
      description: ガイドオブジェクト。
      properties:
        id:
          type: string
        appId:
          type: string
        name:
          type: string
        state:
          type: string
          enum: [staged, published, disabled, draft]
        steps:
          type: array
          items:
            type: object
        createdAt:
          type: integer
          format: int64
        lastUpdatedAt:
          type: integer
          format: int64

    Segment:
      type: object
      description: ビジターセグメント定義。
      properties:
        id:
          type: string
        name:
          type: string
        definition:
          type: object
        createdAt:
          type: integer
          format: int64
        lastUpdatedAt:
          type: integer
          format: int64

    Report:
      type: object
      description: 公開レポート定義。
      properties:
        id:
          type: string
        name:
          type: string
        kind:
          type: string
        createdAt:
          type: integer
          format: int64
        lastUpdatedAt:
          type: integer
          format: int64

    BulkDeletionRequest:
      type: object
      description: 一括削除ジョブのステータスレコード。
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed]
        type:
          type: string
          enum: [visitor, account]
        requestedAt:
          type: integer
          format: int64
        completedAt:
          type: integer
          format: int64
        totalRequested:
          type: integer
        totalDeleted:
          type: integer

    TrackEvent:
      type: object
      description: カスタムトラックイベントのペイロード。
      required:
        - type
        - event
        - visitorId
      properties:
        type:
          type: string
          enum: [track]
        event:
          type: string
          example: "登録完了"
        visitorId:
          type: string
        accountId:
          type: string
        timestamp:
          type: integer
          format: int64
        properties:
          type: object
          additionalProperties: true
        context:
          type: object
          properties:
            ip:
              type: string
            userAgent:
              type: string
            url:
              type: string
            title:
              type: string

    ConversationEvent:
      type: object
      description: Conversations API 用のイベントペイロード。
      required:
        - type
        - visitor_id
        - timestamp
        - props
      properties:
        type:
          type: string
          enum: [prompt, response]
        visitor_id:
          type: string
        account_id:
          type: string
        timestamp:
          type: integer
          format: int64
        props:
          type: object
          properties:
            agentId:
              type: string
            conversationId:
              type: string
            messageId:
              type: string
            content:
              type: string
            suggestedPrompt:
              type: boolean
            toolsUsed:
              type: array
              items:
                type: string
            agentModelUsed:
              type: array
              items:
                type: string
            agentInputTokenCount:
              type: integer
            agentOutputTokenCount:
              type: integer
        context:
          type: object
          properties:
            ip:
              type: string
            userAgent:
              type: string
            url:
              type: string

    FeedbackInput:
      type: object
      description: フィードバックアイテムの作成/更新ペイロード。
      properties:
        accountId:
          type: string
        visitorId:
          type: string
        createdById:
          type: string
        createdAt:
          type: integer
          format: int64
        title:
          type: string
          description: '**作成時は必須。**'
        description:
          type: string
        appIds:
          type: array
          description: '**作成時は必須。**'
          items:
            type: integer
        labels:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              category:
                type: string
        importance:
          type: integer
          description: '重要度レベル（1〜5）。**作成時は必須。**'
          minimum: 1
          maximum: 5
        productAreas:
          type: array
          items:
            type: string

    Feedback:
      type: object
      description: API が返すフィードバックアイテム。
      properties:
        id:
          type: string
        accountId:
          type: string
        visitorId:
          type: string
        title:
          type: string
        description:
          type: string
        importance:
          type: integer
        labels:
          type: array
          items:
            type: object
        createdAt:
          type: integer
          format: int64
        updatedAt:
          type: integer
          format: int64

    accountSchema:
