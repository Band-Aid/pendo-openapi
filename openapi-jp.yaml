            $ref: '#/components/schemas/MetadataFieldSchema'
        auto:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataFieldSchema'
        pendo:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataFieldSchema'
        custom:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataFieldSchema'

    visitorSchema:
      type: object
