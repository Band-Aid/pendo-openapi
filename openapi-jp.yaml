      properties:
        agent:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataFieldSchema'
        auto:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataFieldSchema'
        pendo:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataFieldSchema'
        custom:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MetadataFieldSchema'

    MetadataFieldSchema:
      type: object
      description: 単一のメタデータフィールドのスキーマ定義。
      properties:
        Type:
